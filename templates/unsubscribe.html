<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribed — PrayerThread</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { charcoal: '#1a1a2e', navy: '#16213e', gold: '#e2b96f' } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-charcoal text-white min-h-screen flex items-center justify-center px-4">
  <div class="max-w-sm w-full text-center">
    <p class="text-4xl mb-6">🙏</p>
    <h1 class="text-xl font-bold mb-3">You've been unsubscribed</h1>
    <p class="text-white/50 text-sm mb-8">{{ email }} has been removed from the morning digest. You won't receive any more emails from PrayerThread.</p>
    <a href="/" class="text-gold/70 hover:text-gold text-sm transition-colors">← Back to PrayerThread</a>
  </div>
</body>
</html>
